<svg viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Zelamene — Final-year Computer Science student and full-stack developer">
  <defs>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF2EC4"/>
      <stop offset="100%" stop-color="#3BE0FF"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B0518"/>
      <stop offset="60%" stop-color="#130826"/>
      <stop offset="100%" stop-color="#1E0B33"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- perspective grid floor -->
  <g stroke="#FF2EC4" stroke-width="1.4" opacity="0.38">
    <!-- vertical lines converging to vanishing point (600,191) -->
    <line x1="600" y1="191" x2="-260" y2="320"/>
    <line x1="600" y1="191" x2="60"  y2="320"/>
    <line x1="600" y1="191" x2="250" y2="320"/>
    <line x1="600" y1="191" x2="420" y2="320"/>
    <line x1="600" y1="191" x2="600" y2="320"/>
    <line x1="600" y1="191" x2="780" y2="320"/>
    <line x1="600" y1="191" x2="950" y2="320"/>
    <line x1="600" y1="191" x2="1140" y2="320"/>
    <line x1="600" y1="191" x2="1460" y2="320"/>
  </g>
  <g stroke="#3BE0FF" stroke-width="1.4" opacity="0.32">
    <!-- horizontal floor lines, tighter near the horizon -->
    <line x1="0" y1="198" x2="1200" y2="198"/>
    <line x1="0" y1="208" x2="1200" y2="208"/>
    <line x1="0" y1="222" x2="1200" y2="222"/>
    <line x1="0" y1="241" x2="1200" y2="241"/>
    <line x1="0" y1="266" x2="1200" y2="266"/>
    <line x1="0" y1="298" x2="1200" y2="298"/>
  </g>

  <!-- horizon glow line -->
  <rect x="0" y="189" width="1200" height="3" fill="url(#neon)" filter="url(#glow)"/>

  <!-- name -->
  <text x="600" y="120" text-anchor="middle"
        font-family="'Arial Black','Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="96" font-weight="900" letter-spacing="16"
        fill="url(#neon)" filter="url(#glow)">Zelamene</text>

  <!-- subtitle -->
  <text x="600" y="166" text-anchor="middle"
        font-family="'Trebuchet MS',Verdana,Arial,sans-serif"
        font-size="20" font-weight="700" letter-spacing="7"
        fill="#CFE9FF" filter="url(#softglow)">COMPUTER&#160;SCIENCE&#160;&#160;&#8226;&#160;&#160;FULL&#8211;STACK&#160;DEV</text>

  <!-- corner brackets -->
  <g stroke="url(#neon)" stroke-width="2.5" fill="none" filter="url(#softglow)">
    <path d="M28 28 L28 64 M28 28 L64 28"/>
    <path d="M1172 28 L1172 64 M1172 28 L1136 28"/>
    <path d="M28 292 L28 256 M28 292 L64 292"/>
    <path d="M1172 292 L1172 256 M1172 292 L1136 292"/>
  </g>
</svg>
